<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gesture Field · 3D 粒子手势原型</title>
  <script>
    if (new URLSearchParams(window.location.search).has('desktop')) {
      document.documentElement.classList.add('is-desktop-shell');
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --glass: rgb(245 245 247 / 0.072);
      --glass-strong: rgb(245 245 247 / 0.105);
      --glass-soft: rgb(245 245 247 / 0.048);
      --line: rgb(245 245 247 / 0.15);
      --line-strong: rgb(245 245 247 / 0.24);
      --text: #f5f5f7;
      --muted: rgb(235 235 245 / 0.58);
      --dim: rgb(235 235 245 / 0.34);
      --cyan: #64f3df;
      --violet: #b8a4ff;
      --gold: #ffd184;
      --coral: #ff8a7a;
      --shadow: rgb(0 0 0 / 0.36);
      --radius: 8px;
      --gutter: clamp(16px, 3vw, 30px);
      --font-body: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      --font-mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
      --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      min-width: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.5;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    p { margin: 0; }
    video, canvas, svg { display: block; }

    .experience {
      position: relative;
      min-height: 100svh;
      overflow: hidden;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgb(255 255 255 / 0.035), transparent 23%),
        linear-gradient(90deg, #050506 0%, #090a0a 46%, #050707 100%);
    }

    .experience::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, transparent, rgb(100 243 223 / 0.08), transparent),
        linear-gradient(180deg, rgb(255 255 255 / 0.05), transparent 30%, rgb(0 0 0 / 0.18));
      mask-image: linear-gradient(180deg, black 0%, black 80%, transparent 100%);
      opacity: 0.62;
    }

	    .experience::after {
	      content: "";
	      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgb(0 0 0 / 0.04), transparent 24%, transparent 72%, rgb(0 0 0 / 0.52));
	      opacity: 1;
	    }

    html.is-desktop-shell,
    html.is-desktop-shell body {
      background: transparent !important;
    }

    html.is-desktop-shell .experience {
      background: transparent !important;
    }

    html.is-desktop-shell .experience::before,
    html.is-desktop-shell .experience::after {
      opacity: 0;
    }

    html.is-desktop-shell body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 18px;
      z-index: 20;
      background: transparent;
      -webkit-app-region: drag;
    }

    html.is-desktop-shell button,
    html.is-desktop-shell .desktop-shell-controls,
    html.is-desktop-shell .topbar,
    html.is-desktop-shell .command-deck,
    html.is-desktop-shell .micro-panel,
    html.is-desktop-shell .voice-orchestrator {
      -webkit-app-region: no-drag;
    }

    .desktop-shell-controls {
      display: none;
    }

    html.is-desktop-shell .desktop-shell-controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 30;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      pointer-events: auto;
      opacity: 0.32;
      transition: opacity 160ms ease;
    }

    html.is-desktop-shell[data-interaction-mode="true"] .desktop-shell-controls {
      opacity: 1;
    }

    .desktop-shell-btn {
      width: 30px;
      height: 30px;
      border: 1px solid rgb(245 245 247 / 0.12);
      border-radius: 999px;
      color: rgb(245 245 247 / 0.74);
      background: rgb(12 13 14 / 0.34);
      backdrop-filter: blur(18px) saturate(1.35);
      box-shadow: 0 10px 24px rgb(0 0 0 / 0.18), inset 0 1px 0 rgb(255 255 255 / 0.08);
      line-height: 1;
      display: inline-grid;
      place-items: center;
      transition: background 160ms ease, color 160ms ease, transform 120ms ease;
    }

    .desktop-shell-btn:hover {
      color: #fff;
      background: rgb(245 245 247 / 0.12);
      transform: translateY(-1px);
    }

	    #stage3d {
      position: absolute;
      inset: 0;
      z-index: 1;
      touch-action: none;
    }

    #stage3d canvas {
      width: 100%;
      height: 100%;
    }

    .hud {
      position: relative;
      z-index: 3;
      height: 100svh;
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      padding: 18px var(--gutter) 20px;
      pointer-events: none;
    }

    .topbar,
    .readout,
    .command-deck,
    .camera-chip {
      pointer-events: auto;
    }

    .topbar {
      width: min(100%, 1180px);
      margin-inline: auto;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      gap: 10px;
      width: max-content;
      min-height: 42px;
      padding: 6px 12px 6px 7px;
      border: 1px solid rgb(245 245 247 / 0.11);
      border-radius: var(--radius);
      background: rgb(16 16 18 / 0.46);
      backdrop-filter: blur(28px) saturate(1.55);
      box-shadow: 0 16px 42px rgb(0 0 0 / 0.2), inset 0 1px 0 rgb(255 255 255 / 0.08);
    }

    .brand-mark {
      position: relative;
      width: 28px;
      height: 28px;
      border: 1px solid rgb(245 245 247 / 0.18);
      border-radius: var(--radius);
      background: linear-gradient(145deg, rgb(245 245 247 / 0.16), rgb(245 245 247 / 0.04));
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.12);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgb(100 243 223 / 0.74);
      transform: none;
    }

    .brand-mark::after {
      inset: 11px;
      border-color: transparent;
      background: var(--cyan);
      box-shadow: 0 0 14px rgb(100 243 223 / 0.45);
    }

    .brand-copy {
      min-width: 0;
      display: grid;
      gap: 1px;
    }

    .brand strong {
      overflow: hidden;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span,
    .system-chip,
    .status-label,
    .micro-label,
    .camera-chip span {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .system-chip {
      justify-self: center;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid rgb(245 245 247 / 0.1);
      border-radius: 999px;
      background: rgb(245 245 247 / 0.06);
      color: rgb(245 245 247 / 0.68);
      backdrop-filter: blur(24px) saturate(1.45);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.07);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgb(245 245 247 / 0.26);
      transition: background 160ms ease, box-shadow 160ms ease;
    }

    .live-dot.is-active {
      background: var(--cyan);
      box-shadow: 0 0 0 5px rgb(100 243 223 / 0.1), 0 0 18px rgb(100 243 223 / 0.38);
    }

    .actions {
      justify-self: end;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      min-height: 42px;
      padding: 3px;
      border: 1px solid rgb(245 245 247 / 0.11);
      border-radius: var(--radius);
      background: rgb(16 16 18 / 0.46);
      backdrop-filter: blur(28px) saturate(1.55);
      box-shadow: 0 16px 42px rgb(0 0 0 / 0.2), inset 0 1px 0 rgb(255 255 255 / 0.08);
    }

    .btn,
    .icon-btn,
    .mode-btn {
      border: 1px solid rgb(245 245 247 / 0.12);
      border-radius: var(--radius);
      color: var(--text);
      background: rgb(245 245 247 / 0.055);
      backdrop-filter: blur(24px) saturate(1.45);
      transition: transform 90ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease, box-shadow 180ms ease;
    }

    .btn {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      font-size: 13px;
      font-weight: 560;
      white-space: nowrap;
    }

    .btn svg,
    .icon-btn svg {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
    }

    .btn-primary {
      border-color: rgb(245 245 247 / 0.18);
      background: rgb(245 245 247 / 0.14);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.12);
    }

    .btn:hover,
    .icon-btn:hover,
    .mode-btn:hover {
      border-color: rgb(245 245 247 / 0.28);
      background: rgb(245 245 247 / 0.12);
    }

    .btn-primary:hover,
    .btn[aria-pressed="true"] {
      border-color: rgb(245 245 247 / 0.28);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.16);
    }

    .btn:active,
    .icon-btn:active,
    .mode-btn:active {
      transform: translateY(1px);
    }

    .btn:disabled {
      cursor: wait;
      color: var(--muted);
      border-color: var(--line);
      box-shadow: none;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      color: rgb(245 245 247 / 0.78);
    }

    .middle-zone {
      position: absolute;
      left: var(--gutter);
      bottom: 20px;
      width: min(292px, calc(100% - var(--gutter) * 2));
      margin: 0;
      display: grid;
      grid-template-columns: 1fr;
      align-items: center;
      align-self: end;
      gap: 18px;
    }

    .middle-zone > [aria-hidden="true"],
    .micro-panel {
      display: none;
    }

    .readout {
      align-self: end;
      display: grid;
      gap: 12px;
      padding: 14px 16px 16px;
      border: 1px solid rgb(245 245 247 / 0.12);
      border-radius: var(--radius);
      background: rgb(20 20 22 / 0.54);
      backdrop-filter: blur(32px) saturate(1.55);
      box-shadow: 0 18px 54px rgb(0 0 0 / 0.28), inset 0 1px 0 rgb(255 255 255 / 0.08);
    }

    .status-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 18px;
    }

    .status-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: rgb(245 245 247 / 0.72);
    }

    .mode-readout {
      padding: 2px 0 8px;
      border-bottom: 1px solid rgb(245 245 247 / 0.1);
      border-radius: 0;
      background: transparent;
    }

    .mode-readout strong {
      display: block;
      overflow: hidden;
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 650;
      line-height: 1.05;
      letter-spacing: 0;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mode-readout span {
      display: block;
      margin-top: 5px;
      overflow: hidden;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      column-gap: 18px;
      row-gap: 12px;
    }

    .metric {
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
    }

    .metric strong {
      display: block;
      overflow: hidden;
      color: var(--text);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 640;
      line-height: 1;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      overflow: hidden;
      color: var(--dim);
      font-size: 11px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .micro-panel {
      align-self: start;
      justify-self: end;
      display: grid;
      gap: 8px;
      width: 100%;
      max-width: 190px;
      opacity: 0.94;
    }

    .micro-panel .micro-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgb(9 11 11 / 0.56);
      backdrop-filter: blur(18px);
    }

    .micro-row strong {
      color: #efe9de;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .middle-zone > [aria-hidden="true"],
    .middle-zone .micro-panel {
      display: none;
    }

    .command-deck {
      grid-row: 3;
      align-self: end;
      width: min(calc(100% - 356px), 960px);
      justify-self: end;
      display: grid;
      gap: 0;
      padding: 6px;
      border: 1px solid rgb(245 245 247 / 0.12);
      border-radius: var(--radius);
      background: rgb(20 20 22 / 0.54);
      backdrop-filter: blur(32px) saturate(1.55);
      box-shadow: 0 18px 54px rgb(0 0 0 / 0.28), inset 0 1px 0 rgb(255 255 255 / 0.08);
    }

    .deck-head {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding-inline: 2px;
    }

    .deck-head .micro-label {
      color: #cdd4cf;
    }

    .deck-head span:last-child {
      color: var(--dim);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 4px;
      padding: 2px;
      border-radius: var(--radius);
      background: rgb(245 245 247 / 0.045);
    }

    .mode-btn {
      min-width: 0;
      min-height: 40px;
      padding: 0 10px;
      font-size: 13px;
      font-weight: 560;
      border-color: transparent;
      background: transparent;
      white-space: nowrap;
    }

    .mode-btn[aria-pressed="true"] {
      color: var(--text);
      border-color: rgb(245 245 247 / 0.14);
      background: rgb(245 245 247 / 0.17);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.12), 0 8px 24px rgb(0 0 0 / 0.16);
    }

    .camera-chip {
      position: absolute;
      right: var(--gutter);
      bottom: 126px;
      justify-self: end;
      width: 150px;
      overflow: hidden;
      border: 1px solid rgb(245 245 247 / 0.12);
      border-radius: var(--radius);
      background: rgb(20 20 22 / 0.62);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
      box-shadow: 0 16px 42px rgb(0 0 0 / 0.28), inset 0 1px 0 rgb(255 255 255 / 0.08);
      pointer-events: none;
      backdrop-filter: blur(28px) saturate(1.45);
    }

    .camera-chip.is-visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .camera-chip video,
    .camera-chip canvas {
      width: 100%;
      aspect-ratio: 4 / 3;
    }

    .camera-chip video {
      object-fit: cover;
      transform: scaleX(-1);
      filter: saturate(0.42) contrast(1.08) brightness(0.9);
    }

    .camera-chip canvas {
      position: absolute;
      inset: 0;
      height: auto;
    }

    .camera-chip span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 9px;
      border-top: 1px solid rgb(245 245 247 / 0.1);
    }

    .camera-chip span::after {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--coral);
      box-shadow: 0 0 14px rgb(255 138 122 / 0.42);
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      body { overflow: auto; }

      .hud {
        min-height: 100svh;
        padding-bottom: 16px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      .system-chip {
        display: none;
      }

      .middle-zone {
        position: relative;
        left: auto;
        bottom: auto;
        width: min(100%, 1380px);
        margin-inline: auto;
        grid-template-columns: minmax(240px, 320px) 1fr;
        align-self: end;
      }

      .micro-panel {
        display: none;
      }

      .camera-chip {
        position: absolute;
        right: var(--gutter);
        top: 76px;
        bottom: auto;
        width: 128px;
      }
    }

    @media (max-width: 720px) {
      :root { --gutter: 14px; }

      .hud {
        grid-template-rows: auto 1fr auto;
        gap: 12px;
        padding-top: 12px;
      }

      .topbar {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .actions {
        justify-self: stretch;
        width: 100%;
      }

      .brand {
        width: 100%;
      }

      .actions .btn {
        flex: 1 1 auto;
      }

      .middle-zone {
        grid-template-columns: 1fr;
        align-items: end;
      }

      .readout {
        align-self: end;
      }

      .mode-readout strong {
        font-size: 25px;
      }

      .command-deck {
        width: 100%;
        justify-self: center;
      }

      .mode-switch {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .mode-btn:first-child {
        grid-column: span 3;
      }

      .deck-head span:last-child {
        display: none;
      }

      .camera-chip {
        top: 114px;
        bottom: auto;
        width: 104px;
      }
    }

    @media (max-width: 430px) {
      .brand-copy > span {
        display: none;
      }

      .status-grid {
        grid-template-columns: 1fr 1fr;
      }

      .btn {
        padding-inline: 10px;
      }

      .mode-btn {
        font-size: 12px;
      }
    }

    .topbar,
    .middle-zone {
      display: none !important;
    }

    .hud {
      display: block;
      padding: 0;
    }

    .command-deck {
      position: absolute;
      right: var(--gutter);
      bottom: 20px;
      width: min(760px, calc(100% - var(--gutter) * 2));
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      padding: 7px;
      border: 1px solid rgb(245 245 247 / 0.13);
      border-radius: 999px;
      background: linear-gradient(180deg, rgb(245 245 247 / 0.13), rgb(245 245 247 / 0.065));
      backdrop-filter: blur(34px) saturate(1.65);
      box-shadow:
        0 18px 54px rgb(0 0 0 / 0.3),
        inset 0 1px 0 rgb(255 255 255 / 0.16),
        inset 0 -1px 0 rgb(0 0 0 / 0.18);
      pointer-events: auto;
    }

    .deck-head {
      display: none !important;
    }

    .mode-switch {
      display: flex;
      align-items: center;
      gap: 3px;
      min-width: 0;
      padding: 0;
      border-radius: 999px;
      background: transparent;
    }

    .mode-btn {
      min-width: 54px;
      min-height: 36px;
      padding: 0 13px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: rgb(245 245 247 / 0.62);
      font-size: 13px;
      font-weight: 520;
      box-shadow: none;
    }

    .mode-btn:hover {
      background: rgb(245 245 247 / 0.09);
      color: rgb(245 245 247 / 0.86);
    }

    .mode-btn[aria-pressed="true"] {
      color: #111214;
      border: 0;
      background: rgb(245 245 247 / 0.88);
      box-shadow:
        0 8px 22px rgb(0 0 0 / 0.22),
        inset 0 1px 0 rgb(255 255 255 / 0.45);
    }

    .command-deck .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-height: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      box-shadow: none;
    }

    .command-deck .actions::before {
      content: "";
      width: 1px;
      height: 24px;
      margin-inline: 2px;
      background: rgb(245 245 247 / 0.14);
    }

    .command-deck .btn,
    .command-deck .icon-btn {
      border: 0;
      border-radius: 999px;
      background: rgb(245 245 247 / 0.1);
      color: rgb(245 245 247 / 0.86);
      box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.08);
    }

    .command-deck .btn {
      min-height: 36px;
      padding: 0 14px;
      font-size: 13px;
      font-weight: 560;
    }

    .command-deck .icon-btn {
      width: 36px;
      height: 36px;
    }

    .command-deck .btn:hover,
    .command-deck .icon-btn:hover {
      background: rgb(245 245 247 / 0.16);
      color: var(--text);
    }

    .camera-chip {
      right: var(--gutter);
      bottom: 82px;
    }
