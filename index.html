                  : activeMode === 'gather' ? [0.06, 0.5, 0.46]
                    : teal;
          const vividMode = activeMode === 'heart' || activeMode === 'like';
          const mix = clamp(depth * 0.28 + pulse * (vividMode ? 0.46 : 0.34), 0, vividMode ? 0.84 : 0.72);
          colors[i] = lerp(ink[0], accent[0], mix);
          colors[i + 1] = lerp(ink[1], accent[1], mix);
          colors[i + 2] = lerp(ink[2], accent[2], mix);
          return;
        }

        if (activeMode === 'type' || activeMode === 'heart' || activeMode === 'like') {
          const pulse = (Math.sin(performance.now() * 0.0032 + particle.phase) + 1) / 2;
          if (activeMode === 'heart') {
            colors[i] = lerp(0.98, 1, pulse);
            colors[i + 1] = lerp(0.18, 0.48, pulse);
            colors[i + 2] = lerp(0.36, 0.72, pulse);
          } else if (activeMode === 'like') {
            colors[i] = lerp(0.45, 0.86, pulse);
            colors[i + 1] = lerp(0.92, 1, pulse);
            colors[i + 2] = lerp(0.42, 0.66, pulse);
          } else {
            colors[i] = 1;
            colors[i + 1] = lerp(0.48, 0.72, pulse);
            colors[i + 2] = lerp(0.16, 0.34, pulse);
          }
          return;
        }
        const cyan = [0.2, 0.94, 0.82];
        const violet = [0.67, 0.53, 1.0];
        const gold = [0.96, 0.7, 0.3];
        const base = activeMode === 'vortex' ? violet
          : activeMode === 'type' ? gold
            : cyan;
        const alt = activeMode === 'gather' ? violet : cyan;
        const pulse = (Math.sin(performance.now() * 0.004 + particle.phase) + 1) / 2;
        const depth = clamp((particle.z + 3.2) / 6.4, 0, 1);
        const mix = clamp(depth * 0.38 + pulse * 0.38, 0, 0.92);
        colors[i] = lerp(base[0], alt[0], mix);
        colors[i + 1] = lerp(base[1], alt[1], mix);
        colors[i + 2] = lerp(base[2], alt[2], mix);
      }

      function viewportWorld() {
        state.worldHeight = 2 * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2)) * camera.position.z;
        state.worldWidth = state.worldHeight * camera.aspect;
      }

      function spherePoint(index, total, radius) {
        const offset = 2 / total;
        const increment = Math.PI * (3 - Math.sqrt(5));
        const y = ((index * offset) - 1) + offset / 2;
        const r = Math.sqrt(1 - y * y);
        const phi = index * increment;
        return {
          x: Math.cos(phi) * r * radius,
          y: y * radius,
          z: Math.sin(phi) * r * radius
        };
      }

	      function buildTextTargets() {
        const offscreen = document.createElement('canvas');
        const scale = 3;
        offscreen.width = 960 * scale;
        offscreen.height = 320 * scale;
        const ctx = offscreen.getContext('2d');
        ctx.clearRect(0, 0, offscreen.width, offscreen.height);
        ctx.fillStyle = 'rgb(0, 0, 0)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `700 ${144 * scale}px -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif`;

        const chars = Array.from(typePhrase);
        const gap = 32 * scale;
        const widths = chars.map((char) => ctx.measureText(char).width);
        const totalWidth = widths.reduce((sum, width) => sum + width, 0) + gap * Math.max(0, chars.length - 1);
        let cursor = (offscreen.width - totalWidth) / 2;
        const baseline = offscreen.height * 0.52;
        chars.forEach((char, index) => {
          ctx.fillText(char, cursor + widths[index] / 2, baseline);
          cursor += widths[index] + gap;
        });

        const data = ctx.getImageData(0, 0, offscreen.width, offscreen.height).data;
        const raw = [];
        let minX = offscreen.width;
        let minY = offscreen.height;
        let maxX = 0;
        let maxY = 0;
        const step = 6;
        for (let y = 0; y < offscreen.height; y += step) {
          for (let x = 0; x < offscreen.width; x += step) {
            const alpha = data[(y * offscreen.width + x) * 4 + 3];
            if (alpha > 38) {
              const seed = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
              raw.push({ x, y, seed: seed - Math.floor(seed) });
              minX = Math.min(minX, x);
              minY = Math.min(minY, y);
              maxX = Math.max(maxX, x);
              maxY = Math.max(maxY, y);
            }
          }
        }
        if (!raw.length) {
          textTargets = [];
          return;
        }

        raw.sort((a, b) => a.seed - b.seed);
        const glyphWidth = Math.max(1, maxX - minX);
        const glyphHeight = Math.max(1, maxY - minY);
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        const targetWidth = Math.min(state.worldWidth * 0.72, state.worldHeight * 2.45);
        const targetHeight = targetWidth * (glyphHeight / glyphWidth) * 1.05;
        const targets = [];
        for (let i = 0; i < particleCount; i += 1) {
          const source = raw[Math.floor((i / particleCount) * raw.length) % raw.length];
          targets.push({
            x: ((source.x - centerX) / glyphWidth) * targetWidth + random(-0.035, 0.035),
            y: ((centerY - source.y) / glyphHeight) * targetHeight + random(-0.028, 0.028),
            z: random(-0.12, 0.12)
          });
        }
	        textTargets = targets;
	      }

      function buildHeartTargets() {
        const outline = [];
        let minX = Infinity;
        let maxX = -Infinity;
        let minY = Infinity;
        let maxY = -Infinity;

        for (let i = 0; i < 720; i += 1) {
          const t = (i / 720) * Math.PI * 2;
          const x = 16 * Math.pow(Math.sin(t), 3);
          const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
          outline.push({ x, y });
          minX = Math.min(minX, x);
          maxX = Math.max(maxX, x);
          minY = Math.min(minY, y);
          maxY = Math.max(maxY, y);
        }

        const targetWidth = Math.min(state.worldWidth * 0.3, state.worldHeight * 0.62);
        const targetHeight = targetWidth * 0.92;
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        const width = Math.max(1, maxX - minX);
        const height = Math.max(1, maxY - minY);
        const targets = [];

        for (let i = 0; i < particleCount; i += 1) {
          const seedA = Math.sin(i * 12.9898) * 43758.5453;
          const seedB = Math.sin(i * 78.233) * 19754.217;
          const seedC = Math.sin(i * 37.719) * 31415.926;
          const a = seedA - Math.floor(seedA);
          const b = seedB - Math.floor(seedB);
          const c = seedC - Math.floor(seedC);
          const t = ((i * 0.61803398875 + a * 0.075) % 1) * Math.PI * 2;
          const rawX = 16 * Math.pow(Math.sin(t), 3);
          const rawY = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
          const edgeX = ((rawX - centerX) / width) * targetWidth;
          const edgeY = ((rawY - centerY) / height) * targetHeight;
          const band = a < 0.72 ? 1 + (b - 0.5) * 0.085 : a < 0.9 ? 0.38 + b * 0.52 : 1.02 + b * 0.16;
          const jitter = a < 0.72 ? 0.018 : a < 0.9 ? 0.035 : 0.07;

          targets.push({
            x: edgeX * band + (b - 0.5) * jitter,
            y: edgeY * band + (c - 0.5) * jitter - targetHeight * 0.02,
            z: (c - 0.5) * (a < 0.9 ? 0.16 : 0.32)
          });
        }

        heartTargets = targets;
      }

      function buildSymbolTargets(symbol, scaleRatio = 0.5) {
        const offscreen = document.createElement('canvas');
        const scale = 3;
        offscreen.width = 520 * scale;
        offscreen.height = 520 * scale;
        const ctx = offscreen.getContext('2d');
        ctx.clearRect(0, 0, offscreen.width, offscreen.height);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.font = `${292 * scale}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", -apple-system, BlinkMacSystemFont, sans-serif`;
        ctx.fillText(symbol, offscreen.width / 2, offscreen.height * 0.54);

        const data = ctx.getImageData(0, 0, offscreen.width, offscreen.height).data;
        const raw = [];
        let minX = offscreen.width;
        let minY = offscreen.height;
        let maxX = 0;
        let maxY = 0;
        const step = 7;
        for (let y = 0; y < offscreen.height; y += step) {
          for (let x = 0; x < offscreen.width; x += step) {
            const alpha = data[(y * offscreen.width + x) * 4 + 3];
            if (alpha > 42) {
              const seed = Math.sin(x * 23.17 + y * 71.43) * 57913.173;
              raw.push({ x, y, seed: seed - Math.floor(seed) });
              minX = Math.min(minX, x);
              minY = Math.min(minY, y);
              maxX = Math.max(maxX, x);
              maxY = Math.max(maxY, y);
            }
          }
        }

        if (!raw.length) return [];

        raw.sort((a, b) => a.seed - b.seed);
        const glyphWidth = Math.max(1, maxX - minX);
        const glyphHeight = Math.max(1, maxY - minY);
        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        const targetWidth = Math.min(state.worldWidth * scaleRatio, state.worldHeight * scaleRatio * 1.08);
        const targetHeight = targetWidth * (glyphHeight / glyphWidth);
        const targets = [];

        for (let i = 0; i < particleCount; i += 1) {
          const source = raw[Math.floor((i / particleCount) * raw.length) % raw.length];
          const seedA = Math.sin(i * 17.31) * 9137.77;
          const seedB = Math.sin(i * 41.91) * 27871.61;
          const jitterX = (seedA - Math.floor(seedA) - 0.5) * 0.028;
          const jitterY = (seedB - Math.floor(seedB) - 0.5) * 0.028;
          targets.push({
            x: ((source.x - centerX) / glyphWidth) * targetWidth + jitterX,
            y: ((centerY - source.y) / glyphHeight) * targetHeight + jitterY,
            z: random(-0.1, 0.1)
          });
        }

        return targets;
      }

      function assignTargets() {
        const radius = Math.min(state.worldWidth, state.worldHeight) * 0.3;
        for (let i = 0; i < particleCount; i += 1) {
          const particle = particles[i] || {
            x: random(-state.worldWidth * 0.3, state.worldWidth * 0.3),
            y: random(-state.worldHeight * 0.3, state.worldHeight * 0.3),
            z: random(-2.9, 2.9),
            vx: 0,
            vy: 0,
            vz: 0,
            phase: random(0, Math.PI * 2)
          };
          const vortexAngle = (i / particleCount) * Math.PI * 22;
          const vortexRadius = radius * (0.15 + 0.84 * ((i % 377) / 377));
          particle.sphere = spherePoint(i, particleCount, radius * 0.94);
          particle.vortex = {
            angle: vortexAngle,
            radius: vortexRadius,
            y: ((i / particleCount) - 0.5) * state.worldHeight * 0.72,
            z: Math.sin(vortexAngle) * 1.48
          };
          particles[i] = particle;
        }
      }

      function resize() {
        const rect = stage.getBoundingClientRect();
        state.width = Math.max(320, Math.floor(rect.width));
        state.height = Math.max(420, Math.floor(rect.height));
        renderer.setSize(state.width, state.height, false);
        camera.aspect = state.width / state.height;
        camera.updateProjectionMatrix();
        viewportWorld();
        buildTextTargets();
        buildHeartTargets();
        likeTargets = buildSymbolTargets('👍', 0.5);
        assignTargets();
      }

      function resetParticles(options = {}) {
        for (const particle of particles) {
          particle.x = random(-state.worldWidth * 0.5, state.worldWidth * 0.5);
          particle.y = random(-state.worldHeight * 0.41, state.worldHeight * 0.41);
          particle.z = random(-3.2, 3.2);
          particle.vx = 0;
          particle.vy = 0;
          particle.vz = 0;
        }
      }

      function activeInput() {
        if (hand.active && hand.strength > 0.04) return hand;
        return pointer;
      }

      function setVoiceMode(mode, time = performance.now()) {
        if (!voiceProfiles[mode]) mode = 'idle';
        voiceRuntime.state = mode;
        voiceRuntime.stateStartedAt = time;
        if (voiceModeLabel) voiceModeLabel.textContent = voiceProfiles[mode].label;
        if (voiceOrchestrator) voiceOrchestrator.dataset.voiceState = mode;
        if (voiceVisual) voiceVisual.dataset.voiceState = mode;
      }

      function setVoiceError(message) {
        voiceRuntime.errorMessage = message || '实时语音不可用';
        if (voiceOrchestrator) voiceOrchestrator.title = voiceRuntime.errorMessage;
        setVoiceMode('error');
        syncVoiceControls();
      }

      function syncVoiceControls() {
        const active = voiceRuntime.running || voiceRuntime.starting;
        if (voiceDemoToggle) {
          voiceDemoToggle.textContent = active ? '停止' : '开始';
          voiceDemoToggle.setAttribute('aria-pressed', String(active));
        }
        if (voiceInterrupt) {
          const canInterrupt = Boolean(
            voiceRuntime.running &&
            voiceRuntime.socket &&
            voiceRuntime.socket.readyState === WebSocket.OPEN
          );
          voiceInterrupt.disabled = !canInterrupt;
        }
      }

      function resolveVoiceSocketUrl() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${protocol}//${window.location.host}/voice`;
      }

      function bytesToBase64(bytes) {
        let binary = '';
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
        }
        return btoa(binary);
      }

      function base64ToBytes(base64) {
        const binary = atob(base64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) {
          bytes[i] = binary.charCodeAt(i);
        }
        return bytes;
      }

      function resampleFloat32(input, sourceRate, targetRate) {
        if (!input.length || Math.abs(sourceRate - targetRate) < 1) return input;
        const ratio = sourceRate / targetRate;
        const length = Math.max(1, Math.round(input.length / ratio));
        const output = new Float32Array(length);
        for (let i = 0; i < length; i += 1) {
          const sourceIndex = i * ratio;
          const left = Math.floor(sourceIndex);
          const right = Math.min(input.length - 1, left + 1);
          const fraction = sourceIndex - left;
          output[i] = input[left] * (1 - fraction) + input[right] * fraction;
        }
        return output;
      }

      function rmsEnergy(samples) {
        if (!samples.length) return 0;
        let sum = 0;
        for (let i = 0; i < samples.length; i += 1) {
          sum += samples[i] * samples[i];
        }
        return clamp(Math.sqrt(sum / samples.length) * 5.2, 0, 1);
      }

      function floatToPcm16Base64(samples) {
        const bytes = new Uint8Array(samples.length * 2);
        const view = new DataView(bytes.buffer);
        for (let i = 0; i < samples.length; i += 1) {
          const value = clamp(samples[i], -1, 1);
          const int16 = value < 0 ? value * 0x8000 : value * 0x7fff;
          view.setInt16(i * 2, int16, true);
        }
        return bytesToBase64(bytes);
      }

      function pcm16Base64ToFloat32(base64) {
        const bytes = base64ToBytes(base64);
        const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
        const samples = new Float32Array(Math.floor(bytes.length / 2));
        for (let i = 0; i < samples.length; i += 1) {
          samples[i] = view.getInt16(i * 2, true) / 0x8000;
        }
        return samples;
      }

      function stopVoiceCapture() {
        if (voiceRuntime.captureProcessor) {
          voiceRuntime.captureProcessor.disconnect();
          voiceRuntime.captureProcessor.onaudioprocess = null;
          voiceRuntime.captureProcessor = null;
        }
        if (voiceRuntime.captureSource) {
          voiceRuntime.captureSource.disconnect();
          voiceRuntime.captureSource = null;
        }
        if (voiceRuntime.captureMute) {
          voiceRuntime.captureMute.disconnect();
          voiceRuntime.captureMute = null;
        }
        if (voiceRuntime.stream) {
          for (const track of voiceRuntime.stream.getTracks()) track.stop();
          voiceRuntime.stream = null;
        }
        if (voiceRuntime.captureContext && voiceRuntime.captureContext.state !== 'closed') {
          void voiceRuntime.captureContext.close();
        }
        voiceRuntime.captureContext = null;
        voiceRuntime.micEnergy = 0;
        voiceRuntime.lastMicVoiceAt = 0;
        voiceRuntime.micSpeechActive = false;
      }

      async function startVoiceCapture() {
        if (voiceRuntime.stream) return;
        if (!navigator.mediaDevices?.getUserMedia) {
          throw new Error('当前浏览器不支持麦克风采集');
        }

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          },
          video: false
        });
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        const context = new AudioCtor({ sampleRate: 16000 });
        const source = context.createMediaStreamSource(stream);
        const processor = context.createScriptProcessor(4096, 1, 1);
        const mute = context.createGain();
        mute.gain.value = 0;

        processor.onaudioprocess = (event) => {
          const output = event.outputBuffer.getChannelData(0);
          output.fill(0);
          if (!voiceRuntime.running || voiceRuntime.socket?.readyState !== WebSocket.OPEN) return;
          if (voiceRuntime.state === 'speaking' || voiceRuntime.state === 'thinking') return;

          const input = event.inputBuffer.getChannelData(0);
          const samples = resampleFloat32(input, context.sampleRate, 16000);
          const energy = rmsEnergy(samples);
          const now = performance.now();
          const voiceThreshold = 0.018;
          const tailMs = 650;

          voiceRuntime.micEnergy = lerp(voiceRuntime.micEnergy, energy, 0.35);
          if (energy > voiceThreshold) {
            voiceRuntime.lastMicVoiceAt = now;
            voiceRuntime.micSpeechActive = true;
          }
          if (!voiceRuntime.micSpeechActive || now - voiceRuntime.lastMicVoiceAt > tailMs) {
            voiceRuntime.micSpeechActive = false;
            return;
          }

          voiceRuntime.socket.send(JSON.stringify({
            type: 'audio',
            audio: floatToPcm16Base64(samples)
          }));
        };

        source.connect(processor);
        processor.connect(mute);
        mute.connect(context.destination);
        if (context.state === 'suspended') await context.resume();

        voiceRuntime.stream = stream;
        voiceRuntime.captureContext = context;
        voiceRuntime.captureSource = source;
        voiceRuntime.captureProcessor = processor;
        voiceRuntime.captureMute = mute;
      }

      function stopVoicePlayback() {
        if (voiceRuntime.playbackContext && voiceRuntime.playbackContext.state !== 'closed') {
          void voiceRuntime.playbackContext.close();
        }
        voiceRuntime.playbackContext = null;
        voiceRuntime.playbackTime = 0;
        voiceRuntime.outputEnergy = 0;
      }

      function ensurePlaybackContext() {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!voiceRuntime.playbackContext || voiceRuntime.playbackContext.state === 'closed') {
          voiceRuntime.playbackContext = new AudioCtor({ sampleRate: 24000 });
          voiceRuntime.playbackTime = 0;
        }
        if (voiceRuntime.playbackContext.state === 'suspended') {
          void voiceRuntime.playbackContext.resume();
        }
        return voiceRuntime.playbackContext;
      }

      function playVoiceAudio(base64) {
        const samples = pcm16Base64ToFloat32(base64);
        if (!samples.length) return;

        const context = ensurePlaybackContext();
        const buffer = context.createBuffer(1, samples.length, 24000);
        buffer.copyToChannel(samples, 0);

        const source = context.createBufferSource();
        source.buffer = buffer;
        source.connect(context.destination);

        const startAt = Math.max(context.currentTime + 0.018, voiceRuntime.playbackTime || 0);
        source.start(startAt);
        voiceRuntime.playbackTime = startAt + buffer.duration;
        voiceRuntime.outputEnergy = Math.max(voiceRuntime.outputEnergy, rmsEnergy(samples));
        setVoiceMode('speaking');

        source.onended = () => {
          if (
            voiceRuntime.running &&
            voiceRuntime.state === 'speaking' &&
            context.currentTime >= voiceRuntime.playbackTime - 0.04
          ) {
            setVoiceMode('listening');
          }
        };
      }

      function stopVoiceSession(options = {}) {
        const { socketClosed = false, keepError = false } = options;
        const socket = voiceRuntime.socket;
        voiceRuntime.running = false;
        voiceRuntime.starting = false;
        voiceRuntime.socket = null;
        stopVoiceCapture();
        stopVoicePlayback();
        syncVoiceControls();

        if (!socketClosed && socket && socket.readyState <= WebSocket.OPEN) {
          socket.close(1000, 'client-stop');
        }
        if (!keepError) {
          voiceRuntime.errorMessage = '';
          if (voiceOrchestrator) voiceOrchestrator.title = '';
          setVoiceMode('idle');
        }
      }

      function handleVoiceStatus(status) {
        if (status === 'connecting') {
          setVoiceMode('connecting');
          syncVoiceControls();
          return;
        }

        if (status === 'connected') {
          voiceRuntime.starting = false;
          setVoiceMode('connecting');
          syncVoiceControls();
          return;
        }

        if (status === 'listening') {
          voiceRuntime.starting = false;
          setVoiceMode('listening');
          syncVoiceControls();
          startVoiceCapture().catch((error) => {
            setVoiceError(error instanceof Error ? error.message : '麦克风启动失败');
            stopVoiceSession({ keepError: true });
          });
          return;
        }

        if (status === 'thinking') {
          voiceRuntime.starting = false;
          setVoiceMode('thinking');
          syncVoiceControls();
          return;
        }

        if (status === 'idle' && voiceRuntime.running) {
          stopVoiceSession();
        }
      }

      function handleVoiceServerEvent(event) {
        if (!event?.type) return;
        if (event.type === 'input_audio_buffer.speech_started') {
          setVoiceMode('listening');
          return;
        }
        if (event.type === 'input_audio_buffer.speech_stopped') {
          setVoiceMode('thinking');
          return;
        }
        if (event.type === 'conversation.item.input_audio_transcription.completed') {
          setVoiceMode('thinking');
          return;
        }
        if (event.type === 'response.created') {
          setVoiceMode('thinking');
          return;
        }
        if (event.type === 'response.audio.delta') {
          const delta = event.delta || event.audio || event.data;
          if (typeof delta === 'string') playVoiceAudio(delta);
          return;
        }
        if (event.type === 'response.done') {
          if (voiceRuntime.running) setVoiceMode('listening');
          return;
        }
        if (event.type === 'error') {
          setVoiceError(event.error?.message || '实时语音服务返回错误');
        }
      }

      function handleVoiceSocketMessage(messageEvent) {
        let payload;
        try {
          payload = JSON.parse(messageEvent.data);
        } catch {
          return;
        }

        if (payload.type === 'status') {
          handleVoiceStatus(payload.status);
          return;
        }

        if (payload.type === 'error') {
          setVoiceError(payload.message || '实时语音连接失败');
          return;
        }

        if (payload.type === 'server') {
          handleVoiceServerEvent(payload.event);
        }
      }

      function startVoiceSession() {
        if (voiceRuntime.running || voiceRuntime.starting) return;
        if (!window.WebSocket) {
          setVoiceError('当前浏览器不支持 WebSocket');
          return;
        }

        voiceRuntime.running = true;
        voiceRuntime.starting = true;
        voiceRuntime.errorMessage = '';
        if (voiceOrchestrator) voiceOrchestrator.title = '';
        setVoiceMode('connecting');
        syncVoiceControls();

        const socket = new WebSocket(resolveVoiceSocketUrl());
        voiceRuntime.socket = socket;

        socket.addEventListener('open', () => {
          if (voiceRuntime.socket !== socket) return;
          setVoiceMode('connecting');
          syncVoiceControls();
        });

        socket.addEventListener('message', handleVoiceSocketMessage);

        socket.addEventListener('error', () => {
          if (voiceRuntime.socket !== socket) return;
          setVoiceError('实时语音连接失败');
        });

        socket.addEventListener('close', () => {
          if (voiceRuntime.socket !== socket) return;
          const keepError = voiceRuntime.state === 'error';
          stopVoiceSession({ socketClosed: true, keepError });
        });
      }

      function interruptVoiceSession() {
        if (!voiceRuntime.running || voiceRuntime.socket?.readyState !== WebSocket.OPEN) return;
        voiceRuntime.socket.send(JSON.stringify({ type: 'interrupt' }));
        stopVoicePlayback();
        setVoiceMode('interrupt');
        window.setTimeout(() => {
          if (voiceRuntime.running && voiceRuntime.state === 'interrupt') {
            setVoiceMode('listening');
          }
        }, 520);
      }

      function voiceStateEnergy(time, mode) {
        const elapsed = Math.max(0, time - voiceRuntime.stateStartedAt);
        voiceRuntime.micEnergy = lerp(voiceRuntime.micEnergy, 0, 0.012);
        voiceRuntime.outputEnergy = lerp(voiceRuntime.outputEnergy, 0, 0.028);

        if (mode === 'connecting') {
          return clamp(0.14 + Math.sin(time * 0.0022) * 0.04, 0.08, 0.2);
        }
        if (mode === 'listening') {
          return clamp(
            Math.max(voiceRuntime.micEnergy, 0.18 + Math.sin(time * 0.0028) * 0.03),
            0.1,
            0.82
          );
        }
        if (mode === 'thinking') {
          return clamp(0.16 + Math.sin(time * 0.0014) * 0.035, 0.1, 0.24);
        }
        if (mode === 'speaking') {
          return clamp(
            Math.max(voiceRuntime.outputEnergy, 0.26 + Math.sin(time * 0.0048 + 0.6) * 0.06),
            0.16,
            0.68
          );
        }
        if (mode === 'interrupt') {
          const progress = clamp(elapsed / 520, 0, 1);
          return lerp(0.92, 0.18, progress);
        }
        if (mode === 'error') {
          return clamp(0.16 + Math.sin(time * 0.003) * 0.025, 0.08, 0.22);
        }
        return clamp(0.06 + Math.sin(time * 0.0011) * 0.018, 0.02, 0.1);
      }

      function voiceSignal(time) {
        const mode = voiceRuntime.state || 'idle';
        const profile = voiceProfiles[mode] || voiceProfiles.idle;
        const targetEnergy = voiceStateEnergy(time, mode);
        voiceWave.energy = lerp(voiceWave.energy, targetEnergy, mode === 'interrupt' ? 0.18 : 0.065);
        return { mode, profile, energy: voiceWave.energy };
      }

	      function setupVoiceRuntimeControls() {
	        if (voiceDemoToggle) {
	          voiceDemoToggle.addEventListener('click', () => {
	            if (voiceRuntime.running || voiceRuntime.starting) stopVoiceSession();
	            else startVoiceSession();
          });
        }
        if (voiceInterrupt) {
          voiceInterrupt.addEventListener('click', interruptVoiceSession);
	        }
	        syncVoiceControls();
	      }

      function setupDesktopShellControls() {
        if (window.desktopShell?.onInteractionMode) {
          window.desktopShell.onInteractionMode((enabled) => {
            document.documentElement.dataset.interactionMode = String(Boolean(enabled));
            if (desktopClickThroughToggle) {
              desktopClickThroughToggle.setAttribute('aria-pressed', String(Boolean(enabled)));
            }
          });
        }

        if (desktopCloseButton) {
          desktopCloseButton.addEventListener('click', () => {
            if (window.desktopShell?.close) {
              void window.desktopShell.close();
            } else {
              window.close();
            }
          });
        }

        if (desktopClickThroughToggle) {
          desktopClickThroughToggle.addEventListener('click', async () => {
            if (!window.desktopShell?.toggleClickThrough) return;
            const enabled = await window.desktopShell.toggleClickThrough();
            document.documentElement.dataset.interactionMode = String(Boolean(enabled));
            desktopClickThroughToggle.setAttribute('aria-pressed', String(Boolean(enabled)));
          });
        }
      }

	      function resizeVoiceWave() {
        const rect = voiceCanvas.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const width = Math.max(1, Math.floor(rect.width * dpr));
        const height = Math.max(1, Math.floor(rect.height * dpr));
        if (voiceCanvas.width !== width || voiceCanvas.height !== height) {
          voiceCanvas.width = width;
          voiceCanvas.height = height;
        }
        voiceWave.width = rect.width;
        voiceWave.height = rect.height;
        voiceWave.dpr = dpr;
        voiceCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function voiceWavePoint(x, centerY, amplitude, phase, layer, polarity = 1, startX = 0, endX = voiceWave.width || 1) {
        const activeWidth = Math.max(1, endX - startX);
        const nx = clamp((x - startX) / activeWidth, 0, 1);
        const centered = nx - 0.5;
        const envelope = Math.pow(Math.sin(nx * Math.PI), 1.18);
        const drift = Math.sin(nx * Math.PI * (2.2 + layer * 0.28) + phase) * 0.62;
        const shimmer = Math.sin(nx * Math.PI * (5.1 + layer * 0.33) - phase * 1.28 + layer) * 0.28;
        const breath = Math.sin(nx * Math.PI * 9.4 + phase * 0.62 + layer * 1.7) * 0.1;
        return centerY + (drift + shimmer + breath) * amplitude * envelope * polarity;
      }

      function drawVoiceRibbon(time, layer, level, profile, mode) {
        const width = voiceWave.width;
        const height = voiceWave.height;
        const centerY = height * 0.5;
        const phase = time * (0.00055 + layer * 0.00006) * profile.speed + layer * 0.74;
        const amplitude = height * (0.19 + layer * 0.04) * level;
        const thickness = height * (0.056 + layer * 0.014) * (0.78 + level * 0.28) * profile.thickness;
        const halfSpan = voiceWave.span * 0.5;
        const startX = width * (0.5 - halfSpan);
        const endX = width * (0.5 + halfSpan);
        const activeWidth = endX - startX;
        const step = Math.max(6, activeWidth / 64);
        const top = [];
        const bottom = [];

        for (let x = startX; x <= endX + 0.5; x += step) {
          const nx = clamp((x - startX) / activeWidth, 0, 1);
          const y = voiceWavePoint(x, centerY, amplitude, phase, layer, 1, startX, endX);
          const falloff = Math.pow(Math.sin(nx * Math.PI), 0.92);
          top.push({ x, y: y - thickness * falloff });
          bottom.push({ x, y: y + thickness * falloff });
        }

        const fill = voiceCtx.createLinearGradient(0, centerY - height * 0.32, 0, centerY + height * 0.32);
        fill.addColorStop(0, `rgba(255, 255, 255, ${(0.02 + layer * 0.006) * profile.fill})`);
        fill.addColorStop(0.5, `rgba(245, 245, 247, ${(0.14 - layer * 0.008) * profile.fill})`);
        fill.addColorStop(1, `rgba(168, 205, 198, ${(0.026 + layer * 0.005) * profile.fill})`);

        voiceCtx.beginPath();
        voiceCtx.moveTo(top[0].x, top[0].y);
        for (let i = 1; i < top.length; i += 1) {
          const midX = (top[i - 1].x + top[i].x) / 2;
          const midY = (top[i - 1].y + top[i].y) / 2;
          voiceCtx.quadraticCurveTo(top[i - 1].x, top[i - 1].y, midX, midY);
        }
        for (let i = bottom.length - 1; i >= 0; i -= 1) {
          const point = bottom[i];
          voiceCtx.lineTo(point.x, point.y);
        }
        voiceCtx.closePath();
        voiceCtx.fillStyle = fill;
        voiceCtx.fill();

        voiceCtx.beginPath();
        voiceCtx.moveTo(startX, voiceWavePoint(startX, centerY, amplitude, phase, layer, 1, startX, endX));
        for (let x = startX + step; x <= endX + 0.5; x += step) {
          const prevX = x - step;
          const xMid = prevX + step / 2;
          const yMid = voiceWavePoint(xMid, centerY, amplitude, phase, layer, 1, startX, endX);
          const y = voiceWavePoint(x, centerY, amplitude, phase, layer, 1, startX, endX);
          voiceCtx.quadraticCurveTo(xMid, yMid, x, y);
        }
        voiceCtx.lineWidth = layer === 0 ? 1.55 : 0.98;
        voiceCtx.strokeStyle = layer === 0
          ? `rgba(255, 255, 255, ${(0.58 + level * 0.2) * profile.stroke})`
          : `rgba(232, 238, 236, ${Math.max(0.04, (0.3 - layer * 0.026) * profile.stroke)})`;
        voiceCtx.stroke();

        for (const polarity of [-1, 1]) {
          voiceCtx.beginPath();
          const polarityOffset = mode === 'speaking' ? polarity * 0.24 : polarity * 0.52;
          voiceCtx.moveTo(startX, voiceWavePoint(startX, centerY, amplitude * 0.74, phase + polarityOffset, layer + 0.35, polarity, startX, endX));
          for (let x = startX + step; x <= endX + 0.5; x += step) {
            const prevX = x - step;
            const xMid = prevX + step / 2;
            const yMid = voiceWavePoint(xMid, centerY, amplitude * 0.74, phase + polarityOffset, layer + 0.35, polarity, startX, endX);
            const y = voiceWavePoint(x, centerY, amplitude * 0.74, phase + polarityOffset, layer + 0.35, polarity, startX, endX);
            voiceCtx.quadraticCurveTo(xMid, yMid, x, y);
          }
          voiceCtx.lineWidth = layer < 2 ? 1.12 : 0.76;
          voiceCtx.strokeStyle = `rgba(255, 255, 255, ${Math.max(0.038, (0.27 - layer * 0.032) * profile.stroke)})`;
          voiceCtx.stroke();
        }
      }

      function drawVoiceWave(time) {
        resizeVoiceWave();
        const width = voiceWave.width;
        const height = voiceWave.height;
        if (!width || !height) return;

        const signal = voiceSignal(time);
        const profile = signal.profile;
        const target = profile.base + clamp(signal.energy, 0, 1) * profile.gain;
        voiceWave.level = lerp(voiceWave.level, target, signal.mode === 'interrupt' ? 0.14 : 0.045);
        const level = voiceWave.level;
        const centerY = height * 0.5;
        const halfSpan = voiceWave.span * 0.5;
        const startX = width * (0.5 - halfSpan);
        const endX = width * (0.5 + halfSpan);

        voiceCtx.clearRect(0, 0, width, height);
        voiceCtx.globalCompositeOperation = 'screen';

        for (let layer = 5; layer >= 0; layer -= 1) {
          drawVoiceRibbon(time, layer, level, profile, signal.mode);
        }

        const line = voiceCtx.createLinearGradient(startX, 0, endX, 0);
        line.addColorStop(0, 'rgba(255, 255, 255, 0)');
        line.addColorStop(0.16, `rgba(245, 245, 247, ${0.18 * profile.line})`);
        line.addColorStop(0.5, `rgba(255, 255, 255, ${(0.54 + level * 0.16) * profile.line})`);
        line.addColorStop(0.84, `rgba(245, 245, 247, ${0.18 * profile.line})`);
        line.addColorStop(1, 'rgba(255, 255, 255, 0)');
        voiceCtx.globalCompositeOperation = 'lighter';
        voiceCtx.lineWidth = 1.08;
        voiceCtx.strokeStyle = line;
        voiceCtx.beginPath();
        voiceCtx.moveTo(startX, centerY);
        voiceCtx.lineTo(endX, centerY);
        voiceCtx.stroke();
        voiceCtx.globalCompositeOperation = 'source-over';
      }

      function animateVoiceWave(time) {
        drawVoiceWave(time);
        requestAnimationFrame(animateVoiceWave);
      }

      function clearHandGesture() {
        hand.active = false;
        hand.heart = false;
        hand.vortex = false;
        hand.heartConfidence = 0;
        hand.like = false;
        hand.likeConfidence = 0;
        hand.pinching = false;
        hand.fist = false;
        hand.twoHands = false;
        hand.gestureMode = 'gather';
        hand.pendingMode = 'gather';
        hand.pendingSince = performance.now();
        hand.gestureLockedAt = performance.now();
        hand.hasMotionSample = false;
        hand.motionX = 0;
        hand.motionY = 0;
        hand.speed = 0;
        hand.spin = 0;
      }

      function gestureDwell(mode) {
        if (mode === 'heart') return 220;
        if (mode === 'like') return 280;
        if (mode === 'type') return 150;
        if (mode === 'vortex') return 190;
        if (mode === 'gather') return 110;
        return 240;
      }

      function gestureHold(mode) {
        if (mode === 'heart') return 640;
        if (mode === 'like') return 680;
        if (mode === 'type') return 520;
        if (mode === 'vortex') return 460;
        if (mode === 'gather') return 300;
        return 180;
      }

      function updateHandGesture(candidateMode, now) {
        if (candidateMode !== hand.pendingMode) {
          hand.pendingMode = candidateMode;
          hand.pendingSince = now;
        }

        if (candidateMode === hand.gestureMode) return hand.gestureMode;

        const pendingLongEnough = now - hand.pendingSince >= gestureDwell(candidateMode);
        const currentHeldEnough = now - hand.gestureLockedAt >= gestureHold(hand.gestureMode);
        if (pendingLongEnough && currentHeldEnough) {
          hand.gestureMode = candidateMode;
          hand.gestureLockedAt = now;
        }
        return hand.gestureMode;
      }

      function resolveMode() {
        if (hand.active) {
          return hand.gestureMode || 'gather';
        }
        return 'gather';
      }

      function targetForParticle(particle, index, time, activeMode) {
        if (activeMode === 'gather') return particle.sphere;
        if (activeMode === 'vortex') {
          const input = activeInput();
          const center = hand.active ? worldFromInput(input) : { x: 0, y: 0 };
          const elapsed = time - state.modeChangedAt;
          const entry = 1 - clamp(elapsed / 720, 0, 1);
          const angle = particle.vortex.angle + time * (0.0019 + input.strength * 0.0009) + particle.phase * 0.038 + entry * 2.4;
          const radius = particle.vortex.radius * (1 + entry * 0.62);
          return {
            x: Math.cos(angle) * radius + center.x * 0.28,
            y: particle.vortex.y + Math.sin(angle * 1.4) * (0.38 + entry * 0.18) + center.y * 0.2,
            z: particle.vortex.z + Math.sin(angle) * (1.26 + entry * 0.52)
          };
        }
        if (activeMode === 'like' && likeTargets.length) {
          const symbol = likeTargets[index % likeTargets.length];
          const elapsed = time - state.modeChangedAt;
          const localDelay = (particle.phase / (Math.PI * 2)) * 150;
          const t = clamp((elapsed - localDelay) / 680, 0, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          const entry = 1 - ease;
          const swirl = 0.16;
          const rise = 0.18 * entry;
          const entryScale = 1 + entry * 0.32;
          return {
            x: symbol.x * entryScale + Math.cos(particle.phase + time * 0.0032) * swirl * entry,
            y: symbol.y * entryScale + Math.sin(particle.phase * 1.35 + time * 0.0026) * swirl * 0.68 * entry + rise,
            z: symbol.z + Math.sin(particle.phase + time * 0.003) * 0.42 * entry
          };
        }
        if (activeMode === 'heart' && heartTargets.length) {
          const heart = heartTargets[index % heartTargets.length];
          const elapsed = time - state.modeChangedAt;
          const localDelay = (particle.phase / (Math.PI * 2)) * 180;
          const t = clamp((elapsed - localDelay) / 760, 0, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          const spiral = (1 - ease) * (2.15 + Math.sin(particle.phase) * 0.55);
          const orbit = 0.32 * (1 - ease);
          const scale = 1 + (1 - ease) * 0.58;
          return {
            x: heart.x * scale + Math.cos(particle.phase + spiral + time * 0.0042) * orbit,
            y: heart.y * scale + Math.sin(particle.phase * 1.4 + spiral + time * 0.0036) * orbit * 0.68,
            z: heart.z + Math.sin(particle.phase + time * 0.0048) * 0.5 * (1 - ease)
          };
        }
        if (activeMode === 'type' && textTargets.length) return textTargets[index % textTargets.length];
        return particle.sphere;
      }

      function worldFromInput(input) {
        return {
          x: (input.x - 0.5) * state.worldWidth,
          y: (0.5 - input.y) * state.worldHeight
        };
      }

      function updateParticles(time, activeMode) {
        const input = activeInput();
        const focus = worldFromInput(input);
        const radius = 0.95 + input.strength * 2.35;
        const isSphereMode = activeMode === 'gather';
        const magneticSign = isSphereMode ? -1 : 1;
        const isTypeMode = activeMode === 'type';
        const isHeartMode = activeMode === 'heart';
        const isSymbolMode = activeMode === 'like';
        const isShapeMode = isTypeMode || isHeartMode || isSymbolMode || isSphereMode;
        const hasLiveInput = hand.active || state.pointerInside || state.pointerDown;
        const shapeEntrance = isShapeMode ? 1 - clamp((time - state.modeChangedAt) / 900, 0, 1) : 0;

        for (let i = 0; i < particleCount; i += 1) {
          const particle = particles[i];
          const target = targetForParticle(particle, i, time, activeMode);
          const shapeFloatX = isHeartMode ? 0.038 : isSymbolMode ? 0.032 : isSphereMode ? 0.014 : 0.026;
          const shapeFloatY = isHeartMode ? 0.03 : isSymbolMode ? 0.026 : isSphereMode ? 0.012 : 0.02;
          const floatX = isShapeMode ? Math.sin(time * 0.001 + particle.phase) * (shapeFloatX + shapeEntrance * 0.034) : Math.sin(time * 0.0011 + particle.phase) * 0.09;
          const floatY = isShapeMode ? Math.cos(time * 0.0012 + particle.phase) * (shapeFloatY + shapeEntrance * 0.028) : Math.cos(time * 0.0014 + particle.phase) * 0.07;

          const shapeStiffness = isHeartMode ? 0.046 : isSymbolMode ? 0.044 : isSphereMode ? 0.048 : 0.04;
          let ax = (target.x + floatX - particle.x) * (isShapeMode ? shapeStiffness + shapeEntrance * 0.016 : 0.018);
          let ay = (target.y + floatY - particle.y) * (isShapeMode ? shapeStiffness + shapeEntrance * 0.016 : 0.018);
          let az = (target.z - particle.z) * (isShapeMode ? (isHeartMode ? 0.036 : isSphereMode ? 0.038 : 0.034) + shapeEntrance * 0.012 : 0.016);

          const dx = particle.x - focus.x;
          const dy = particle.y - focus.y;
          const dz = particle.z * 0.32;
          const distance = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
          const interactionRadius = isShapeMode ? (isHeartMode ? 0.52 + input.strength * 0.74 : isSymbolMode ? 0.58 + input.strength * 0.7 : isSphereMode ? 0.5 : 0.74 + input.strength * 1.35) : radius;
          if ((!isShapeMode || (hasLiveInput && !isHeartMode && !isSymbolMode && !isSphereMode)) && distance < interactionRadius) {
            const force = isShapeMode
              ? (1 - distance / interactionRadius) * (0.006 + input.strength * 0.03)
              : (1 - distance / interactionRadius) * (0.02 + input.strength * 0.075);
            const sign = isShapeMode ? 1 : magneticSign;
            ax += (dx / distance) * force * sign;
            ay += (dy / distance) * force * sign;
            az += (dz / distance) * force * (isShapeMode ? 0.16 : 0.42);
          }

          particle.vx = (particle.vx + ax) * (isShapeMode ? (isHeartMode || isSymbolMode || isSphereMode ? 0.82 + shapeEntrance * 0.02 : 0.84) : 0.9);
          particle.vy = (particle.vy + ay) * (isShapeMode ? (isHeartMode || isSymbolMode || isSphereMode ? 0.82 + shapeEntrance * 0.02 : 0.84) : 0.9);
          particle.vz = (particle.vz + az) * (isShapeMode ? (isHeartMode || isSymbolMode || isSphereMode ? 0.84 + shapeEntrance * 0.02 : 0.86) : 0.91);
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.z += particle.vz;

          const offset = i * 3;
          positions[offset] = particle.x;
          positions[offset + 1] = particle.y;
          positions[offset + 2] = particle.z;
          colorForParticle(particle, offset, activeMode);
        }
        geometry.attributes.position.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;
      }

      function updateLabels(activeMode) {
        const now = performance.now();
        if (hand.active && now - state.lastHandAt > 650) {
          clearHandGesture();
          hand.strength = 0;
          pointsState.textContent = '0';
        }

        const input = activeInput();
        const energy = Math.round(clamp(input.strength, 0, 1) * 100);
        energyState.textContent = `${energy}%`;
        signalState.textContent = `${energy}%`;
        depthState.textContent = activeMode === 'type' ? '0.8'
          : activeMode === 'heart' ? '0.6'
            : activeMode === 'like' ? '2.2'
              : activeMode === 'vortex' ? '4.1'
                : '1.8';
        modeCaption.textContent = modeCaptions[activeMode] || 'SPHERE / LOCKED';
        modeState.textContent = modeLabels[activeMode] || '自动';

        let label = '待机';
        if (hand.active) {
          inputState.textContent = '手势识别';
          if (activeMode === 'heart') label = '比心爱心';
          else if (activeMode === 'like') label = '👍形态';
          else if (activeMode === 'type') label = hand.twoHands ? '双手成字' : '成字';
          else if (hand.fist) label = '握拳聚合';
          else if (hand.pinching) label = '捏合聚合';
          else if (activeMode === 'vortex') label = '旋掌漩涡';
          else label = '手势牵引';
        } else {
          inputState.textContent = state.cameraActive ? '等待手势' : '指针备用';
          if (state.pointerDown) label = '按住聚合';
          else if (state.pointerInside) label = '指针牵引';
        }

        const active = hand.active || state.pointerInside || state.pointerDown;
        liveDot.classList.toggle('is-active', active);
        panelLiveDot.classList.toggle('is-active', active);
        systemState.textContent = hand.active ? 'Hand tracking' : active ? 'Pointer signal' : 'Pointer standby';
        gestureState.textContent = label;
      }

      function animate(time) {
        const delta = Math.max(1, time - state.lastFrame);
        state.lastFrame = time;
        state.fps = lerp(state.fps, 1000 / delta, 0.06);
        fpsState.textContent = String(Math.round(state.fps));

        const resolvedMode = resolveMode();
        if (state.activeMode !== resolvedMode) {
          state.previousMode = state.activeMode;
          state.activeMode = resolvedMode;
          state.modeChangedAt = time;
        }
        const activeMode = state.activeMode;
        updateParticles(time, activeMode);
        updateLabels(activeMode);
        const sphereLocked = activeMode === 'gather';
        const shapeLocked = activeMode === 'type' || activeMode === 'heart' || activeMode === 'like' || sphereLocked;
        const basePointSize = isDesktopShell ? 0.044 : 0.038;
        const transitionPulse = Math.max(0, 1 - (time - state.modeChangedAt) / 720);
        const heartPulse = activeMode === 'heart' ? transitionPulse : 0;
        const symbolPulse = activeMode === 'like' ? transitionPulse : 0;
        const spherePulse = sphereLocked ? transitionPulse : 0;
        const vortexPulse = activeMode === 'vortex' ? transitionPulse : 0;
        const confirmPulse = activeMode === 'like' ? transitionPulse : 0;
        const shapePointSize = activeMode === 'heart'
          ? (isDesktopShell ? 0.052 : 0.046) + heartPulse * 0.01
          : activeMode === 'like'
            ? (isDesktopShell ? 0.05 : 0.044) + symbolPulse * 0.008
            : sphereLocked
              ? (isDesktopShell ? 0.047 : 0.041) + spherePulse * 0.006
              : (isDesktopShell ? 0.048 : 0.042);
        material.size = lerp(material.size, shapeLocked ? shapePointSize : basePointSize + vortexPulse * 0.008 + confirmPulse * 0.006, 0.08);
        const targetRotationY = activeMode === 'gather'
            ? Math.sin(time * 0.00012) * 0.045
            : shapeLocked
              ? Math.sin(time * 0.00016) * (activeMode === 'heart' ? 0.05 + heartPulse * 0.08 : 0.026)
              : Math.sin(time * 0.00018) * (activeMode === 'vortex' ? 0.16 + vortexPulse * 0.12 : 0.1);
        const targetRotationX = activeMode === 'gather'
            ? Math.cos(time * 0.0001) * 0.026
            : shapeLocked
              ? Math.cos(time * 0.00013) * (activeMode === 'heart' ? 0.028 + heartPulse * 0.04 : 0.014)
              : Math.cos(time * 0.00014) * (activeMode === 'vortex' ? 0.1 + vortexPulse * 0.08 : 0.06);
        const targetRotationZ = activeMode === 'gather'
            ? Math.sin(time * 0.00011) * 0.012
            : shapeLocked
              ? Math.sin(time * 0.00011) * (activeMode === 'heart' ? 0.035 + heartPulse * 0.08 : 0.008)
              : Math.sin(time * 0.00011) * (activeMode === 'vortex' ? 0.08 + vortexPulse * 0.12 : 0.025);
        points.rotation.y = lerp(points.rotation.y, targetRotationY, 0.08);
        points.rotation.x = lerp(points.rotation.x, targetRotationX, 0.08);
        points.rotation.z = lerp(points.rotation.z, targetRotationZ, 0.08);
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      function updatePointer(event) {
        const rect = stage.getBoundingClientRect();
        pointer.x = clamp((event.clientX - rect.left) / rect.width, 0, 1);
        pointer.y = clamp((event.clientY - rect.top) / rect.height, 0, 1);
        pointer.strength = state.pointerDown ? 1 : 0.38;
      }

      function drawHandOverlay(hands) {
        const rect = cameraChip.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        const width = Math.max(1, Math.floor(rect.width * dpr));
        const height = Math.max(1, Math.floor((rect.width * 0.75) * dpr));
        if (handOverlay.width !== width || handOverlay.height !== height) {
          handOverlay.width = width;
          handOverlay.height = height;
        }
        handCtx.clearRect(0, 0, width, height);
        handCtx.lineWidth = 1.5 * dpr;
        handCtx.strokeStyle = 'rgba(53, 241, 210, 0.55)';
        handCtx.fillStyle = 'rgba(245, 182, 77, 0.92)';

        for (const landmarks of hands) {
          for (const [from, to] of bones) {
            const a = landmarks[from];
            const b = landmarks[to];
            handCtx.beginPath();
            handCtx.moveTo((1 - a.x) * width, a.y * height);
            handCtx.lineTo((1 - b.x) * width, b.y * height);
            handCtx.stroke();
          }
          for (const point of landmarks) {
            handCtx.beginPath();
            handCtx.arc((1 - point.x) * width, point.y * height, 2.4 * dpr, 0, Math.PI * 2);
            handCtx.fill();
          }
        }
      }

      function handCenter(landmarks) {
        let x = 0;
        let y = 0;
        for (const point of landmarks) {
          x += point.x;
          y += point.y;
        }
        return { x: x / landmarks.length, y: y / landmarks.length };
      }

      function handleHands(results) {
        const hands = results.multiHandLandmarks || [];
        const now = performance.now();
        drawHandOverlay(hands);
        pointsState.textContent = String(hands.length * 21);

        if (!hands.length) {
          clearHandGesture();
          hand.strength = lerp(hand.strength, 0, 0.2);
          return;
        }

        const primary = hands[0];
        const wrist = primary[0];
        const middleMcp = primary[9];
        const indexTip = primary[8];
        const indexPip = primary[6];
        const indexMcp = primary[5];
        const thumbTip = primary[4];
        const thumbIp = primary[3];
        const thumbMcp = primary[2];
        const middleTip = primary[12];
        const middlePip = primary[10];
        const middleMcp2 = primary[9];
        const ringTip = primary[16];
        const ringPip = primary[14];
        const ringMcp = primary[13];
        const pinkyTip = primary[20];
        const pinkyPip = primary[18];
        const pinkyMcp = primary[17];
        const palm = Math.max(0.035, distance2(wrist, middleMcp));
        const pinchRatio = distance2(thumbTip, indexTip) / palm;
        const reach = [8, 12, 16, 20].reduce((sum, id) => sum + distance2(primary[id], wrist), 0) / (4 * palm);
        const openScore = clamp((reach - 2.15) / 1.2, 0, 1);
        const indexReach = distance2(indexTip, wrist) / palm;
        const thumbReach = distance2(thumbTip, wrist) / palm;
        const foldedReach = [middleTip, ringTip, pinkyTip].reduce((sum, point) => sum + distance2(point, wrist), 0) / (3 * palm);
        const fingerMetrics = [
          { tip: indexTip, pip: indexPip, mcp: indexMcp },
          { tip: middleTip, pip: middlePip, mcp: middleMcp2 },
          { tip: ringTip, pip: ringPip, mcp: ringMcp },
          { tip: pinkyTip, pip: pinkyPip, mcp: pinkyMcp }
        ].map(({ tip, pip, mcp }) => {
          const tipReach = distance2(tip, wrist) / palm;
          const pipReach = distance2(pip, wrist) / palm;
          const mcpReach = distance2(mcp, wrist) / palm;
          return {
            tipReach,
            pipReach,
            mcpReach,
            span: distance2(tip, pip) / palm,
            extended: tipReach > pipReach + 0.24 && tipReach > mcpReach + 0.62,
            folded: tipReach < pipReach + 0.08 || tipReach < mcpReach + 0.45
          };
        });
        const [indexFinger, middleFinger, ringFinger, pinkyFinger] = fingerMetrics;
        const foldedCount = [middleFinger, ringFinger, pinkyFinger].reduce((sum, finger) => sum + (finger.folded ? 1 : 0), 0);
        const extendedCount = [middleFinger, ringFinger, pinkyFinger].reduce((sum, finger) => sum + (finger.extended ? 1 : 0), 0);
        const screenExtendedCount = [
          [middleTip, middlePip, middleMcp2],
          [ringTip, ringPip, ringMcp],
          [pinkyTip, pinkyPip, pinkyMcp]
        ].reduce((sum, [tip, pip, mcp]) => {
          const upward = tip.y < pip.y - palm * 0.03 && tip.y < mcp.y - palm * 0.12;
          const longEnough = distance2(tip, mcp) / palm > 0.92;
          return sum + (upward && longEnough ? 1 : 0);
        }, 0);
        const allFoldedCount = fingerMetrics.reduce((sum, finger) => sum + (finger.folded ? 1 : 0), 0);
        const fistStructure = hands.length === 1
          && allFoldedCount >= 3
          && openScore < 0.52
          && indexReach < 1.42
          && foldedReach < 1.38;

        let twoHandRaw = false;
        if (hands.length > 1) {
          const first = handCenter(hands[0]);
          const second = handCenter(hands[1]);
          const twoHandDistance = distance2(first, second);
          hand.twoHands = true;
          hand.twoHandDistance = lerp(hand.twoHandDistance, twoHandDistance, 0.3);
          twoHandRaw = twoHandDistance > 0.42;
        } else {
          hand.twoHands = false;
          hand.twoHandDistance = lerp(hand.twoHandDistance, 0, 0.2);
        }

        const pinchClose = 1 - smoothstep(0.24, 0.42, pinchRatio);
        const thumbReady = smoothstep(1.0, 1.24, thumbReach);
        const indexDominance = smoothstep(-0.02, 0.26, indexReach - foldedReach);
        const closePinch = pinchRatio < 0.34;
        const heartCandidate = closePinch && foldedCount >= 2 && openScore < 0.74;
        const heartStructure = hands.length === 1
          && heartCandidate
          && indexFinger.span > 0.34
          && indexDominance > 0.36
          && foldedCount >= 2
          && extendedCount <= 1
          && screenExtendedCount <= 1
          && openScore < 0.74;
        const fingerHeartScore = hands.length === 1
          ? (heartStructure ? 1 : 0) * pinchClose * Math.max(thumbReady, 0.72)
          : 0;

        hand.heartConfidence = lerp(
          hand.heartConfidence,
          fingerHeartScore,
          fingerHeartScore > hand.heartConfidence ? 0.32 : 0.34
        );
        const heartScore = hand.heartConfidence > (hand.gestureMode === 'heart' ? 0.44 : 0.64);
        const thumbUpAmount = (wrist.y - thumbTip.y) / palm;
        const thumbAboveFingers = thumbTip.y < Math.min(indexTip.y, middleTip.y, ringTip.y, pinkyTip.y) - palm * 0.08;
        const thumbLineUp = thumbTip.y < thumbIp.y && thumbIp.y < thumbMcp.y + palm * 0.1;
        const thumbUpScore = smoothstep(0.58, 0.9, thumbUpAmount);
        const thumbExtended = smoothstep(1.12, 1.5, thumbReach);
        const compactScore = 1 - smoothstep(0.5, 0.72, openScore);
        const likeStructure = hands.length === 1
          && thumbAboveFingers
          && thumbLineUp
          && indexFinger.folded
          && middleFinger.folded
          && ringFinger.folded
          && pinkyFinger.folded
          && foldedCount >= 3
          && !heartScore;
        const likeRawScore = hands.length === 1
          ? (likeStructure ? 1 : 0) * thumbUpScore * thumbExtended * compactScore
          : 0;
        hand.likeConfidence = lerp(
          hand.likeConfidence,
          likeRawScore,
          likeRawScore > hand.likeConfidence ? 0.3 : 0.34
        );
        const likeScore = hand.likeConfidence > (hand.gestureMode === 'like' ? 0.58 : 0.78);
        const gesturePoint = heartScore
          ? { x: (indexTip.x + thumbTip.x) * 0.5, y: (indexTip.y + thumbTip.y) * 0.5 }
          : indexTip;
        const nextX = clamp(1 - gesturePoint.x, 0.04, 0.96);
        const nextY = clamp(gesturePoint.y, 0.04, 0.96);
        const palmAngle = Math.atan2(indexTip.y - wrist.y, indexTip.x - wrist.x);

        if (hand.hasMotionSample) {
          const dx = nextX - hand.lastGestureX;
          const dy = nextY - hand.lastGestureY;
          let angleDelta = palmAngle - hand.lastPalmAngle;
          while (angleDelta > Math.PI) angleDelta -= Math.PI * 2;
          while (angleDelta < -Math.PI) angleDelta += Math.PI * 2;
          hand.motionX = lerp(hand.motionX, dx, 0.36);
          hand.motionY = lerp(hand.motionY, dy, 0.36);
          hand.speed = lerp(hand.speed, Math.hypot(hand.motionX, hand.motionY), 0.42);
          hand.spin = lerp(hand.spin, Math.abs(angleDelta), 0.24);
        } else {
          hand.hasMotionSample = true;
          hand.motionX = 0;
          hand.motionY = 0;
          hand.speed = 0;
          hand.spin = 0;
        }
        hand.lastGestureX = nextX;
        hand.lastGestureY = nextY;
        hand.lastPalmAngle = palmAngle;

        const protectedShapeIntent = heartCandidate
          || hand.heartConfidence > 0.18
          || hand.likeConfidence > 0.18;
        const fistRaw = fistStructure
          && !protectedShapeIntent
          && !heartScore
          && !likeScore;
        const pinchRaw = pinchRatio < 0.42 && !heartScore && !likeScore && !heartCandidate;
        const openPalmRaw = hands.length === 1 && openScore > 0.72 && foldedCount === 0 && extendedCount >= 2 && !protectedShapeIntent && !pinchRaw && !fistRaw && !heartScore && !likeScore;
        const movingPalm = Math.abs(hand.motionX) > 0.014 || hand.spin > 0.06;
        const vortexRaw = openPalmRaw && movingPalm;

        let candidateMode = 'gather';
        if (twoHandRaw) candidateMode = 'type';
        else if (heartScore) candidateMode = 'heart';
        else if (likeScore) candidateMode = 'like';
        else if (fistRaw || pinchRaw) candidateMode = 'gather';
        else if (vortexRaw) candidateMode = 'vortex';

        const stableMode = updateHandGesture(candidateMode, now);

        hand.x = lerp(hand.x, nextX, 0.42);
        hand.y = lerp(hand.y, nextY, 0.42);
        hand.open = lerp(hand.open, openScore, 0.28);
        hand.heart = stableMode === 'heart';
        hand.like = stableMode === 'like';
        hand.fist = stableMode === 'gather' && fistRaw;
        hand.pinching = stableMode === 'gather' && (pinchRaw || fistRaw);
        hand.vortex = stableMode === 'vortex';
        const strengthTarget = stableMode === 'heart' || stableMode === 'gather' || stableMode === 'like' || stableMode === 'type'
          ? 1
          : stableMode === 'vortex'
            ? 0.9
            : 0.4 + openScore * 0.34;
        hand.strength = lerp(hand.strength, strengthTarget, 0.3);
        hand.active = true;
        state.lastHandAt = now;
      }

      async function ensureHandModel() {
        if (state.handModel) return state.handModel;
        if (!window.Hands) {
          throw new Error('MediaPipe Hands 未加载');
        }
        const model = new window.Hands({
          locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });
        model.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.66,
          minTrackingConfidence: 0.62
        });
        model.onResults(handleHands);
        state.handModel = model;
        return model;
      }

      async function handLoop() {
        if (!state.cameraActive || !state.handModel) return;
        if (!state.handBusy && video.readyState >= 2) {
          state.handBusy = true;
          try {
            await state.handModel.send({ image: video });
          } catch (error) {
            inputState.textContent = '识别中断';
          } finally {
            state.handBusy = false;
          }
        }
        requestAnimationFrame(handLoop);
      }

      async function enableHands() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          inputState.textContent = '无摄像头能力';
          return;
        }
        if (state.cameraActive) return;
        inputState.textContent = '加载模型';
        systemState.textContent = 'Loading hand model';
        try {
          await ensureHandModel();
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 640 },
              height: { ideal: 480 },
              facingMode: 'user'
            },
            audio: false
          });
          video.srcObject = stream;
          await video.play();
          state.cameraActive = true;
          cameraChip.classList.add('is-visible');
          inputState.textContent = '手势识别';
          systemState.textContent = 'Hand tracking';
          requestAnimationFrame(handLoop);
        } catch (error) {
          const errorName = error?.name || '';
          if (errorName === 'NotAllowedError') inputState.textContent = '摄像头未授权';
          else if (errorName === 'NotFoundError') inputState.textContent = '未找到摄像头';
          else inputState.textContent = `手势启动失败${errorName ? `: ${errorName}` : ''}`;
          systemState.textContent = 'Hand unavailable';
        }
      }

      if (window.desktopShell?.onStartHands) {
        window.desktopShell.onStartHands(() => {
          void enableHands();
        });
      }

      stage.addEventListener('pointerenter', () => {
        state.pointerInside = true;
      });
      stage.addEventListener('pointerleave', () => {
        state.pointerInside = false;
        state.pointerDown = false;
        pointer.strength = 0.18;
      });
      stage.addEventListener('pointermove', updatePointer);
      stage.addEventListener('pointerdown', (event) => {
        state.pointerDown = true;
        updatePointer(event);
        stage.setPointerCapture(event.pointerId);
      });
      stage.addEventListener('pointerup', (event) => {
        state.pointerDown = false;
        updatePointer(event);
      });

      const resizeObserver = new ResizeObserver(resize);
      resizeObserver.observe(stage);
      resize();
      resetParticles({ keepMode: true });
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
